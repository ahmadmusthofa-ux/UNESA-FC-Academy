<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Registrasi Player - UNESA FC ACADEMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pitch: {
                            dark: '#0a122c',
                            card: 'rgba(20, 30, 65, 0.75)',
                            border: 'rgba(255, 255, 255, 0.15)',
                            lime: '#b6f000',
                            blue: '#002f6c',
                            accent: '#6366f1',
                            emerald: '#10b981'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Latar belakang stadion terang ceria yang dinamis & responsif */
        body {
            min-height: 100vh;
            background-color: #09464b;
            background-image: 
                radial-gradient(circle at 50% -10%, rgba(182, 240, 0, 0.4) 0%, transparent 60%), 
                radial-gradient(circle at 50% 115%, rgba(16, 185, 129, 0.35) 0%, transparent 55%),
                radial-gradient(circle at 10% 40%, rgba(99, 102, 241, 0.25) 0%, transparent 50%), 
                radial-gradient(circle at 90% 70%, rgba(16, 185, 129, 0.2) 0%, transparent 45%),
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.015) 0px, rgba(255, 255, 255, 0.015) 40px, transparent 40px, transparent 80px);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Menggunakan flex-start agar tidak terpotong di layar HP pendek */
            padding: 24px 12px;
        }

        .card-shadow {
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* Desain dropdown select modern kustom */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230a122c' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.1em;
        }

        /* Responsivitas scrollbar di dalam form */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(182, 240, 0, 0.3);
            border-radius: 99px;
        }
    </style>
</head>

<body>

<div class="w-full max-w-2xl bg-pitch-card backdrop-blur-2xl border border-pitch-border rounded-[24px] sm:rounded-[35px] p-4 sm:p-6 md:p-10 card-shadow text-center my-auto">
    
    <div class="w-16 h-16 sm:w-24 sm:h-24 mx-auto mb-3 sm:mb-4 bg-white/5 rounded-2xl flex items-center justify-content-center p-2.5 sm:p-3 border border-white/10 shadow-[0_0_20px_rgba(182,240,0,0.25)]">
        <img src="https://i.ibb.co.com/vCdYT1pF/logo-unesa-Fc-removebg-preview.png" alt="Logo UNESA FC" class="w-full h-full object-contain">
    </div>

    <div class="text-pitch-lime tracking-[3px] sm:tracking-[4px] text-[10px] sm:text-[11px] font-black uppercase mb-1">Unesa Football Academy</div>
    <h2 class="text-2xl sm:text-3xl font-black text-white tracking-tight">REGISTRASI PLAYER</h2>
    <p class="text-xs text-slate-300 max-w-md mx-auto mt-2 mb-6 sm:mb-8 leading-relaxed px-2">
        Lengkapi formulir di bawah ini dengan benar untuk mendaftarkan siswa baru di UNESA FC ACADEMY.
    </p>

    <!-- FORM START -->
    <div class="text-left space-y-6 sm:space-y-8">
        
        <!-- SECTION 1 -->
        <div>
            <div class="text-[10px] sm:text-[11px] font-black tracking-widest text-pitch-lime uppercase mb-3.5 flex items-center gap-2">
                <span>01</span>
                <span>DATA UTAMA & LOGIN AKUN</span>
                <span class="h-[1px] flex-grow bg-pitch-lime/20"></span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1.5 ml-1">Nama Lengkap Player</label>
                    <input id="nama" type="text" placeholder="Contoh: Budi Santoso" class="w-full py-2.5 sm:py-3 px-3.5 sm:px-4 rounded-xl bg-white/95 text-pitch-dark text-xs sm:text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1.5 ml-1">Email Aktif (Akses Login)</label>
                    <input id="email" type="email" placeholder="nama@email.com" class="w-full py-2.5 sm:py-3 px-3.5 sm:px-4 rounded-xl bg-white/95 text-pitch-dark text-xs sm:text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1.5 ml-1">Password Baru (Min. 6 Karakter)</label>
                    <input id="password" type="password" placeholder="Buat password login" class="w-full py-2.5 sm:py-3 px-3.5 sm:px-4 rounded-xl bg-white/95 text-pitch-dark text-xs sm:text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1.5 ml-1">Nomor Induk Kependudukan (NIK)</label>
                    <input id="nik" type="text" inputmode="numeric" placeholder="16 digit NIK Player" class="w-full py-2.5 sm:py-3 px-3.5 sm:px-4 rounded-xl bg-white/95 text-pitch-dark text-xs sm:text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                </div>
            </div>
        </div>

        <!-- SECTION 2 -->
        <div>
            <div class="text-[10px] sm:text-[11px] font-black tracking-widest text-pitch-lime uppercase mb-3.5 flex items-center gap-2">
                <span>02</span>
                <span>BIODATA & KONTAK PLAYER</span>
                <span class="h-[1px] flex-grow bg-pitch-lime/20"></span>
            </div>
            
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1.5 ml-1">Tempat, Tanggal Lahir</label>
                        <input id="ttl" type="text" placeholder="Contoh: Surabaya, 15 Juni 2012" class="w-full py-2.5 sm:py-3 px-3.5 sm:px-4 rounded-xl bg-white/95 text-pitch-dark text-xs sm:text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1.5 ml-1">No. HP Player (Jika ada)</label>
                        <input id="nohp" type="tel" placeholder="Contoh: 08123456789" class="w-full py-2.5 sm:py-3 px-3.5 sm:px-4 rounded-xl bg-white/95 text-pitch-dark text-xs sm:text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1.5 ml-1">Alamat Rumah Lengkap</label>
                    <input id="alamat" type="text" placeholder="Contoh: Jl. Lidah Wetan No. 45, Surabaya" class="w-full py-2.5 sm:py-3 px-3.5 sm:px-4 rounded-xl bg-white/95 text-pitch-dark text-xs sm:text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                </div>
            </div>
        </div>

        <!-- SECTION 3 -->
        <div>
            <div class="text-[10px] sm:text-[11px] font-black tracking-widest text-pitch-lime uppercase mb-3.5 flex items-center gap-2">
                <span>03</span>
                <span>KONTAK ORANG TUA / WALI</span>
                <span class="h-[1px] flex-grow bg-pitch-lime/20"></span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1.5 ml-1">Nama Orang Tua / Wali</label>
                    <input id="ortu" type="text" placeholder="Nama lengkap Ibu / Ayah" class="w-full py-2.5 sm:py-3 px-3.5 sm:px-4 rounded-xl bg-white/95 text-pitch-dark text-xs sm:text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1.5 ml-1">No. HP WhatsApp Orang Tua</label>
                    <input id="hpOrtu" type="tel" placeholder="Contoh: 082231353380" class="w-full py-2.5 sm:py-3 px-3.5 sm:px-4 rounded-xl bg-white/95 text-pitch-dark text-xs sm:text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                </div>
            </div>
        </div>

        <!-- SECTION 4 -->
        <div>
            <div class="text-[11px] font-black tracking-widest text-pitch-lime uppercase mb-4 flex items-center gap-2">
                <span>04</span>
                <span>PILIHAN PROGRAM LATIHAN</span>
                <span class="h-[1px] flex-grow bg-pitch-lime/20"></span>
            </div>
            
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-2 ml-1">Kategori / Program</label>
                    <select id="kategori" class="w-full py-3 px-4 rounded-xl bg-white/95 text-pitch-dark text-sm font-semibold border-2 border-transparent focus:border-pitch-lime focus:bg-white outline-none transition duration-300">
                        <option value="Trial Class"> Trial (2x Latihan Gratis)</option>
                        <option value="Reguler (2x/Minggu)">Reguler (2x Latihan - Rp 250rb/bln)</option>
                        <option value="Intensif (4x/Minggu)">Intensif (4x Latihan - Rp 350rb/bln)</option>
                    </select>
                </div>
            </div>
        </div>

    </div>

    <button onclick="register()" id="btnReg" class="w-full mt-8 py-4 bg-pitch-lime text-pitch-dark font-black tracking-wider rounded-xl hover:opacity-90 active:scale-[0.98] transition-all duration-300 uppercase shadow-[0_10px_25px_rgba(182,240,0,0.3)]">
        Daftar Sekarang
    </button>

    <div id="loading" class="hidden mt-4 items-center justify-center gap-2 text-pitch-lime font-black text-sm uppercase tracking-widest">
        <div class="w-4 h-4 border-2 border-transparent border-t-pitch-lime rounded-full animate-spin"></div>
        <span>Mendaftarkan player baru...</span>
    </div>

    <a href="index.html" class="back block text-center mt-6 text-slate-400 hover:text-pitch-lime font-bold text-xs tracking-wider transition">
        ← KEMBALI KE BERANDA
    </a>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby-caKYBBTqnEEt3az__d4HoymcVkomEDHIUHrFivmDhwsr0HzlE-TtPFVSmake_le2/exec";

    // Fungsi validasi email
    function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(String(email).toLowerCase());
    }

    async function register() {
        const fields = {
            nama: document.getElementById('nama'),
            email: document.getElementById('email'),
            password: document.getElementById('password'),
            nik: document.getElementById('nik'),
            ttl: document.getElementById('ttl'),
            nohp: document.getElementById('nohp'),
            alamat: document.getElementById('alamat'),
            ortu: document.getElementById('ortu'),
            hpOrtu: document.getElementById('hpOrtu'),
            kategori: document.getElementById('kategori')
        };

        const emailValue = fields.email.value.trim();

        // 1. Validasi Input Kosong Wajib
        if (!fields.nama.value.trim() || !emailValue || !fields.password.value.trim() || !fields.nik.value.trim() || !fields.ortu.value.trim() || !fields.hpOrtu.value.trim()) {
            Swal.fire({
                icon: 'warning',
                title: 'Data Belum Lengkap',
                text: 'Nama, Email, Password, NIK, Nama Orang Tua, dan No. HP Orang Tua wajib diisi.',
                confirmButtonColor: '#6366f1'
            });
            return;
        }

        // 2. Validasi Format Email
        if (!validateEmail(emailValue)) {
            Swal.fire({
                icon: 'error',
                title: 'Email Tidak Valid',
                text: 'Silakan masukkan alamat email yang benar (contoh: budi@gmail.com).',
                confirmButtonColor: '#ef4444'
            });
            return;
        }

        // 3. Validasi Panjang Password
        if (fields.password.value.length < 6) {
            Swal.fire({
                icon: 'warning',
                title: 'Password Terlalu Pendek',
                text: 'Password login minimal harus 6 karakter.',
                confirmButtonColor: '#6366f1'
            });
            return;
        }

        // 4. Validasi Panjang NIK
        if (fields.nik.value.trim().length < 16) {
            Swal.fire({
                icon: 'warning',
                title: 'NIK Tidak Sesuai',
                text: 'NIK Player harus bernilai 16 digit.',
                confirmButtonColor: '#6366f1'
            });
            return;
        }

        // Hitung nilai paket secara otomatis agar kompatibel dengan spreadsheet database
        let calculatedPaket = '2x Sesi Bebas';
        if (fields.kategori.value === 'Reguler (2x/Minggu)') {
            calculatedPaket = 'Selasa-Jumat';
        } else if (fields.kategori.value === 'Intensif (4x/Minggu)') {
            calculatedPaket = 'Full Sesi (4x)';
        }

        const loader = document.getElementById('loading');
        const btn = document.getElementById('btnReg');

        loader.style.display = 'flex';
        btn.disabled = true;
        btn.style.opacity = '0.5';

        try {
            let response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'register',
                    nama: fields.nama.value.trim(),
                    email: emailValue.toLowerCase(),
                    password: fields.password.value.trim(),
                    nik: fields.nik.value.trim(),
                    ttl: fields.ttl.value.trim(),
                    nohp: fields.nohp.value.trim(),
                    alamat: fields.alamat.value.trim(),
                    ortu: fields.ortu.value.trim(),
                    hpOrtu: fields.hpOrtu.value.trim(),
                    kategori: fields.kategori.value,
                    paket: calculatedPaket
                })
            });

            let result = await response.json();
            loader.style.display = 'none';

            if (result.status) {
                Swal.fire({
                    icon: 'success',
                    title: 'Berhasil Terdaftar!',
                    text: 'Akun player Unesa FC Academy berhasil dibuat. Silakan login.',
                    confirmButtonText: 'Ke Halaman Login',
                    confirmButtonColor: '#10b981'
                }).then(() => {
                    window.location.href = 'login.html';
                });
            } else {
                btn.disabled = false;
                btn.style.opacity = '1';
                Swal.fire({
                    icon: 'error',
                    title: 'Pendaftaran Gagal',
                    text: result.message || 'Coba lagi beberapa saat lagi.',
                    confirmButtonColor: '#ef4444'
                });
            }
        } catch (err) {
            loader.style.display = 'none';
            btn.disabled = false;
            btn.style.opacity = '1';
            Swal.fire({
                icon: 'error',
                title: 'Masalah Koneksi',
                text: 'Gagal menghubungi server. Pastikan internet Anda aktif.',
                confirmButtonColor: '#ef4444'
            });
        }
    }
</script>

</body>
</html>
